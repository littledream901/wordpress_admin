version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vue-fastapi-admin
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      # 从 .env 文件读取所有变量
      TZ: Asia/Shanghai
    env_file:
      - .env
    volumes:
      # 持久化 SQLite 数据库（如使用外部 DB 可移除）
      - ./data:/opt/vue-fastapi-admin/data
      # 日志持久化
      - ./logs:/opt/vue-fastapi-admin/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/api/v1/base/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
