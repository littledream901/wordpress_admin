services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wordpress-admin
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${APP_PORT:-127.0.0.1:18080}:80"
    environment:
      TZ: Asia/Shanghai
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # 日志持久化
      - ./logs:/opt/wordpress-admin/logs
      # 用户头像持久化
      - ./static:/opt/wordpress-admin/static
      # Feed 上传文件持久化
      - ./uploads/feeds:/opt/wordpress-admin/uploads/feeds
      # 数据备份 / SQLite 持久化
      - ./data:/opt/wordpress-admin/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/api/v1/base/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: wordpress-admin-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-secret-change-me}
      MYSQL_DATABASE: ${DB_NAME:-vue_fastapi_admin}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-to-a-strong-password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root-secret-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

volumes:
  mysql-data:
    driver: local

networks:
  app-network:
    driver: bridge
