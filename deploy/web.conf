# Nginx 请求限流区域定义
# api_limit: 每秒 10 请求，突发 20
# login_limit: 每分钟 5 请求，突发 3
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ========== 日志格式 ==========
log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';

server {
    listen 80;
    server_name localhost;

    # 客户端上传大小限制（支持头像、WooCommerce 产品图片等上传）
    client_max_body_size 100m;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ========== 安全响应头 ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== Gzip 压缩 ==========
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/ttf
        font/otf;

    # ========== 静态文件上传目录（头像等） ==========
    location /static/ {
        alias /opt/wordpress-admin/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ========== 前端静态文件 ==========
    location / {
        root /opt/wordpress-admin/web/dist;
        index index.html index.htm;
        try_files $uri /index.html;

        # 带 hash 的静态资源长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            root /opt/wordpress-admin/web/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========== API 反向代理 ==========
    location ^~ /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        # 登录接口额外限流
        location ~ ^/api/v1/base/access_token$ {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://127.0.0.1:9999;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        proxy_pass http://127.0.0.1:9999;

        # 较长的超时设置，支持建站/采集/导入/大文件上传等长时间操作
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连接支持（HubStudio Agent 心跳、实时状态推送）
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ========== 屏蔽敏感路径 ==========
    location ~ ^/(docs|redoc|openapi\.json|doc\.json) {
        return 404;
    }
}
